# config/panel/top_layer.yaml
widgets:
  # Header (Status Bar)
  - obj:
      id: top_bar_header
      align: TOP_MID
      width: 100%
      height: 50
      bg_color: 0x07293E
      bg_opa: 100%
      radius: 0
      scrollbar_mode: "OFF"
      border_width: 0
      layout:
        type: flex
        flex_align_cross: center
        flex_align_main: space_between
        flex_flow: row
      pad_left: 15
      pad_right: 100
      widgets:
        # Левая часть: Время и Дата
        - obj:
            bg_opa: TRANSP
            border_width: 0
            width: 300
            layout: { type: flex, flex_flow: row, flex_align_cross: center }
            pad_all: 0
            widgets:
              - label:
                  id: top_time_label
                  text: "00:00"
                  text_font: roboto_22
                  text_color: 0xFFFFFF
                  pad_right: 15
              - label:
                  id: top_date_label
                  text: "01.01.2024"
                  text_font: roboto_14
                  text_color: 0xAAAAAA
                  width: 150

        # Правая часть: Статусы (Battery, HA, WiFi, Temp)
        - obj:
            bg_opa: TRANSP
            border_width: 0
            width: 280
            layout: { type: flex, flex_flow: row, flex_align_cross: center, flex_align_main: end }
            pad_all: 0
            widgets:
              # Internal Battery
              - label:
                  id: lbl_bat_icon
                  text: "\U000F007E"
                  text_font: mdi_20
                  text_color: 0x00FF00

              # Internal Battery Percentage
              - label:
                  id: lbl_bat_text
                  text: "0%"
                  text_font: roboto_14
                  text_color: 0xAAAAAA
                  pad_right: 20

              # HA Status Icon
              - label:
                  id: lbl_hastatus
                  text: "\U0000e935"
                  text_font: icons_20
                  text_color: 0x00FF00
                  pad_right: 20
              
              # WiFi Strength Icon
              - label:
                  id: lbl_wifi_signal
                  text: "\U0000e934"
                  text_font: icons_20
                  text_color: 0xFFFFFF
                  pad_right: 20
              
              # Outside Temperature
              - label:
                  id: lbl_top_temp
                  text: "--.-°C"
                  text_font: roboto_14
                  text_color: 0xAAAAAA

  # Footer (Navigation)
  - buttonmatrix:
          id: top_bar_footer
          align: bottom_mid
          styles: footer_style
          pad_all: 0
          outline_width: 0
          items:
            styles: btn_nav_style
          rows:
            - buttons:
              - id: page_prev
                text: "\uF053"
                on_press:
                  then:
                    lvgl.page.previous:
              - id: page_home
                text: "\uF015"
                on_press:
                  then:
                    lvgl.page.show: page_dash
              - id: page_next
                text: "\uF054"
                on_press:
                  then:
                    lvgl.page.next:
