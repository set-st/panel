# config/panel/top_layer.yaml
widgets:
  # Header (Status Bar)
  - obj:
      id: top_bar_header
      align: TOP_MID
      width: 100%
      height: 50
      bg_color: 0x07293E
      bg_opa: 100%
      radius: 0
      scrollbar_mode: "OFF"
      border_width: 0
      layout:
        type: flex
        flex_align_cross: center
        flex_align_main: space_between
        flex_flow: row
      pad_left: 15
      pad_right: 100
      widgets:
        # Левая часть: Время и Дата
        - obj:
            bg_opa: TRANSP
            border_width: 0
            width: 300
            layout: { type: flex, flex_flow: row, flex_align_cross: center }
            pad_all: 0
            widgets:
              - label:
                  id: top_time_label
                  text: "00:00"
                  text_font: roboto_22
                  text_color: 0xFFFFFF
                  pad_right: 15
              - label:
                  id: top_date_label
                  text: "01.01.2024"
                  text_font: roboto_14
                  text_color: 0xAAAAAA
                  width: 150

        # Правая часть: Статусы (Battery, HA, WiFi, Temp)
        - obj:
            bg_opa: TRANSP
            border_width: 0
            width: 280
            layout: { type: flex, flex_flow: row, flex_align_cross: center, flex_align_main: end }
            pad_all: 0
            widgets:
              # Internal Battery
              - label:
                  id: lbl_bat_icon
                  text: "\U000F007E"
                  text_font: mdi_20
                  text_color: 0x00FF00

              # Internal Battery Percentage
              - label:
                  id: lbl_bat_text
                  text: "0%"
                  text_font: roboto_14
                  text_color: 0xAAAAAA
                  pad_right: 20

              # HA Status Icon
              - label:
                  id: lbl_hastatus
                  text: "\U0000e935"
                  text_font: icons_20
                  text_color: 0x00FF00
                  pad_right: 20
              
              # WiFi Strength Icon
              - label:
                  id: lbl_wifi_signal
                  text: "\U0000e934"
                  text_font: icons_20
                  text_color: 0xFFFFFF
                  pad_right: 20
              
              # Outside Temperature
              - label:
                  id: lbl_top_temp
                  text: "--.-°C"
                  text_font: roboto_14
                  text_color: 0xAAAAAA

  # Footer (Navigation)
  - buttonmatrix:
          id: top_bar_footer
          align: bottom_mid
          styles: footer_style
          pad_all: 0
          outline_width: 0
          items:
            styles: btn_nav_style
            checked:
              bg_color: 0x103E5C
              bg_opa: 100%
              border_width: 2
              border_color: 0x00FF00
          rows:
            - buttons:
              - id: page_watch_sw
                text: "\U000F0425"
                on_press:
                  then:
                    - lvgl.page.show: page_watch
                    - lambda: |-
                        id(idle_counter) = 0;
                        auto call = id(display_backlight).make_call();
                        call.set_brightness(0.03); // Мінімальна яскравість (нічний режим)
                        call.perform();
              - id: page_dash_sw
                text: "\U000F12A9"
                on_press:
                  then:
                    lvgl.page.show: page_dash
              - id: page_lights_sw
                text: "\U000F1802"
                on_press:
                  then:
                    lvgl.page.show: page_lights
              - id: page_temp_sw
                text: "\U000F050F"
                on_press:
                  then:
                    lvgl.page.show: page_temp
              - id: page_solar_sw
                text: "\U000F1903"
                on_press:
                  then:
                    lvgl.page.show: page_solar
              - id: page_settings_sw
                text: "\U000F0493"
                on_press:
                  then:
                    lvgl.page.show: page_settings

              - id: page_prev
                text: "\U000F0141"
                on_press:
                  then:
                    lvgl.page.previous:
              - id: page_home
                text: "\U000F02DC"
                on_press:
                  then:
                    lvgl.page.show: page_dash
              - id: page_next
                text: "\U000F0142"
                on_press:
                  then:
                    lvgl.page.next:
