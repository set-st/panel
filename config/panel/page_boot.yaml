# config/panel/page_boot.yaml
id: page_boot
bg_color: 0x0B1114
widgets:
  - obj:
      width: 100%
      height: 100%
      bg_opa: TRANSP
      layout:
        type: flex
        flex_flow: column
        flex_align_main: center
        flex_align_cross: center
      widgets:
        # Центральная иконка или логотип (используем иконку дома)
        - label:
            text: "\U000F02DC"
            text_font: roboto_60
            text_color: 0x0A84FF
            pad_bottom: 20

        # Заголовок
        - label:
            text: "SYSTEM STARTING"
            text_font: roboto_22
            text_color: 0xFFFFFF
            pad_bottom: 10

        # Статус подключения
        - label:
            id: boot_status_label
            text: "Connecting to Home Assistant..."
            text_font: roboto_14
            text_color: 0xAAAAAA

        # Индикатор (простой текст или можно добавить спиннер если поддерживается)
        - spinner:
            width: 40
            height: 40
            line_width: 4
            line_color: 0x0A84FF
            arc_length: 60
            spin_time: 1000ms
            y: 30
